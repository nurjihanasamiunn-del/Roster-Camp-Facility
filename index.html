<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster & Cuti Divisi</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; }
  .badge { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
  tr.overdue { background:#fee2e2; }
  tr.near { background:#ffedd5; }
  tr.outsite { background:#e0f2fe; }
  .modal-bg { background:rgba(0,0,0,0.5); }

  ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:4px; }

<body class="bg-slate-100 min-h-screen pb-20">

<!-- HEADER -->
<div class="bg-[#0b1f4d] text-white px-6 py-4 flex items-center justify-between shadow">
  <div>
    <h1 class="text-xl font-bold">Roster & Cuti Divisi</h1>
    <p class="text-xs text-slate-300">Sistem Insite / Outsite &amp; Saldo Cuti Karyawan</p>
  </div>
  <button onclick="openAddEmployeeModal()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm font-semibold">+ Tambah Karyawan</button>
</div>

<!-- STATS -->
<div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 px-6 mt-6"></div>

<!-- SEARCH -->
<div class="px-6 mt-6 flex flex-wrap gap-3 items-center">
  <input id="searchBox" oninput="render()" placeholder="Cari nama / NIK / jabatan..." class="border rounded-lg px-3 py-2 w-72 text-sm">
  <select id="filterStatus" onchange="render()" class="border rounded-lg px-3 py-2 text-sm">
    <option value="">Semua Status</option>
    <option value="insite">Insite</option>
    <option value="outsite">Outsite</option>
    <option value="overdue">Overdue Roster</option>
    <option value="expiring">Cuti Akan Hangus</option>
  </select>
  <label class="flex items-center gap-2 text-sm">
    <input type="checkbox" id="filterWarningOnly" onchange="render()"> Tampilkan hanya yang ada warning
  </label>
</div>

<!-- TABLE -->
<div class="px-6 mt-4 overflow-x-auto">
  <table class="min-w-full bg-white rounded-lg shadow text-sm">
    <thead class="bg-slate-200 text-slate-700">
      <tr>
        <th class="p-2 text-left">Nama</th>
        <th class="p-2 text-left">NIK</th>
        <th class="p-2 text-left">Jabatan</th>
        <th class="p-2 text-left">Status</th>
        <th class="p-2 text-left">Hari Kerja Berjalan</th>
        <th class="p-2 text-left">Sisa Menuju JT Roster</th>
        <th class="p-2 text-left">Saldo Tahunan</th>
        <th class="p-2 text-left">Saldo Extra</th>
        <th class="p-2 text-left">Warning</th>
        <th class="p-2 text-left">Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ============ MODAL: ADD EMPLOYEE ============ -->
<div id="modalAddEmployee" class="fixed inset-0 modal-bg hidden items-center justify-center z-50">
  <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h2 class="text-lg font-bold mb-4">Tambah Karyawan</h2>
    <div class="space-y-3">
      <input id="inpNik" placeholder="NIK" class="border rounded-lg px-3 py-2 w-full text-sm">
      <input id="inpNama" placeholder="Nama" class="border rounded-lg px-3 py-2 w-full text-sm">
      <input id="inpJabatan" placeholder="Jabatan" class="border rounded-lg px-3 py-2 w-full text-sm">
      <input id="inpGolongan" placeholder="Golongan" class="border rounded-lg px-3 py-2 w-full text-sm">
      <div>
        <label class="text-xs text-slate-500">Tanggal Masuk Kerja</label>
        <input type="date" id="inpJoinDate" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div>
        <label class="text-xs text-slate-500">Mulai Hitung Siklus Roster Saat Ini</label>
        <input type="date" id="inpCycleStart" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-5">
      <button onclick="closeModal('modalAddEmployee')" class="px-4 py-2 rounded-lg text-sm bg-slate-200">Batal</button>
      <button onclick="saveEmployee()" class="px-4 py-2 rounded-lg text-sm bg-emerald-500 text-white font-semibold">Simpan</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: CATAT KEJADIAN ============ -->
<div id="modalEvent" class="fixed inset-0 modal-bg hidden items-center justify-center z-50">
  <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h2 class="text-lg font-bold mb-1">Catat Kejadian Roster</h2>
    <p class="text-xs text-slate-500 mb-4" id="eventEmployeeName"></p>

    <label class="text-xs text-slate-500">Jenis Kejadian</label>
    <select id="eventType" onchange="renderEventFields()" class="border rounded-lg px-3 py-2 w-full text-sm mb-3">
      <option value="pulang_normal">Pulang Normal (ambil cuti)</option>
      <option value="diundur">Diundur oleh Foreman/Atasan</option>
      <option value="diuangkan">Cuti Roster Diuangkan</option>
    </select>

    <div id="eventFields"></div>

    <div class="flex justify-end gap-2 mt-5">
      <button onclick="closeModal('modalEvent')" class="px-4 py-2 rounded-lg text-sm bg-slate-200">Batal</button>
      <button onclick="submitEvent()" class="px-4 py-2 rounded-lg text-sm bg-emerald-500 text-white font-semibold">Simpan</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: HISTORY ============ -->
<div id="modalHistory" class="fixed inset-0 modal-bg hidden items-center justify-center z-50">
  <div class="bg-white rounded-xl p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto">
    <h2 class="text-lg font-bold mb-1">Riwayat & Saldo</h2>
    <p class="text-xs text-slate-500 mb-4" id="histEmployeeName"></p>
    <div id="histContent"></div>
    <div class="flex justify-end mt-5">
      <button onclick="closeModal('modalHistory')" class="px-4 py-2 rounded-lg text-sm bg-slate-200">Tutup</button>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const SUPABASE_URL = "https://zfnaavogagmffwjndamj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbmFhdm9nYWdtZmZ3am5kYW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMzY1MjQsImV4cCI6MjA5ODkxMjUyNH0.8nAyAk9febmWBhjLsuLhjHLn1EZr3NanGm6WoSdbZmU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ STATE ============
let employees = [];
let annualLedger = [];
let extraLedger = [];
let currentEventEmployee = null;
let currentHistEmployee = null;

const ROSTER_CYCLE_DAYS = 70;
const WARNING_DAYS = 30;

// ============ DATE HELPERS ============
function todayStr(){ return new Date().toISOString().slice(0,10); }
function d(dateStr){ return new Date(dateStr + "T00:00:00"); }
function daysBetween(a,b){ return Math.round((d(b) - d(a)) / 86400000); }
function addDays(dateStr, n){
  const dt = d(dateStr);
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0,10);
}
function addYears(dateStr, n){
  const dt = d(dateStr);
  dt.setFullYear(dt.getFullYear() + n);
  return dt.toISOString().slice(0,10);
}
function addMonths(dateStr, n){
  const dt = d(dateStr);
  dt.setMonth(dt.getMonth() + n);
  return dt.toISOString().slice(0,10);
}
function fmtDate(dateStr){
  if(!dateStr) return "-";
  const dt = d(dateStr);
  return dt.toLocaleDateString("id-ID", { day:"2-digit", month:"short", year:"numeric" });
}

// ============ DATA LOADING ============
async function loadData(){
  const [{data: emp, error: e1}, {data: al, error: e2}, {data: el, error: e3}] = await Promise.all([
    sb.from('employees').select('*').order('nama'),
    sb.from('annual_leave_ledger').select('*'),
    sb.from('extra_leave_ledger').select('*')
  ]);
  if(e1 || e2 || e3){ console.error(e1,e2,e3); alert('Gagal memuat data. Cek console.'); return; }
  employees = emp || [];
  annualLedger = al || [];
  extraLedger = el || [];
  await ensureAllAnnualLedgers();
  render();
}

// Pastikan setiap karyawan punya entri tahunan untuk setiap anniversary yang sudah lewat
async function ensureAllAnnualLedgers(){
  const today = todayStr();
  const toInsert = [];
  for(const emp of employees){
    const existingDates = new Set(annualLedger.filter(r=>r.employee_id===emp.id).map(r=>r.earned_date));
    let anniv = addYears(emp.join_date, 1);
    let n = 1;
    while(anniv <= today && n <= 50){
      if(!existingDates.has(anniv)){
        toInsert.push({
          employee_id: emp.id,
          earned_date: anniv,
          expiry_date: addYears(anniv, 1),
          amount: 12, used: 0, cashed: 0
        });
      }
      n++;
      anniv = addYears(emp.join_date, n);
    }
  }
  if(toInsert.length){
    const {data, error} = await sb.from('annual_leave_ledger').insert(toInsert).select();
    if(error){ console.error(error); }
    else { annualLedger = annualLedger.concat(data); }
  }
}

// ============ DERIVED CALC ============
function activeLedgerFor(table, employeeId){
  const today = todayStr();
  return table.filter(r => r.employee_id === employeeId && r.expiry_date >= today);
}
function remaining(row, type){
  if(type==='annual') return row.amount - row.used - row.cashed;
  return row.extra_earned - row.used - row.cashed;
}
function saldoTahunan(empId){
  return activeLedgerFor(annualLedger, empId).reduce((s,r)=>s+remaining(r,'annual'),0);
}
function saldoExtra(empId){
  return activeLedgerFor(extraLedger, empId).reduce((s,r)=>s+remaining(r,'extra'),0);
}
function nearestExpiry(table, empId){
  const rows = activeLedgerFor(table, empId).filter(r => (table===annualLedger? remaining(r,'annual'):remaining(r,'extra')) > 0);
  if(!rows.length) return null;
  rows.sort((a,b)=> a.expiry_date.localeCompare(b.expiry_date));
  return rows[0].expiry_date;
}
function warningsFor(empId){
  const warnings = [];
  const today = todayStr();
  const nTah = nearestExpiry(annualLedger, empId);
  if(nTah && daysBetween(today, nTah) <= WARNING_DAYS){
    warnings.push(`Tahunan expire ${fmtDate(nTah)} (H-${daysBetween(today,nTah)})`);
  }
  const nExt = nearestExpiry(extraLedger, empId);
  if(nExt && daysBetween(today, nExt) <= WARNING_DAYS){
    warnings.push(`Extra expire ${fmtDate(nExt)} (H-${daysBetween(today,nExt)})`);
  }
  return warnings;
}
function elapsedCycleDays(emp){
  return daysBetween(emp.cycle_start_date, todayStr());
}
function sisaJT(emp){
  return ROSTER_CYCLE_DAYS - elapsedCycleDays(emp);
}

// ============ RENDER ============
function render(){
  const search = document.getElementById('searchBox').value.toLowerCase();
  const filterStatus = document.getElementById('filterStatus').value;
  const warningOnly = document.getElementById('filterWarningOnly').checked;

  let list = employees.filter(emp=>{
    const matchesSearch = !search || emp.nama.toLowerCase().includes(search) || emp.nik.toLowerCase().includes(search) || (emp.jabatan||'').toLowerCase().includes(search);
    let matchesStatus = true;
    if(filterStatus === 'insite' || filterStatus === 'outsite'){
      matchesStatus = emp.status === filterStatus;
    } else if(filterStatus === 'overdue'){
      matchesStatus = sisaJT(emp) < 0;
    } else if(filterStatus === 'expiring'){
      matchesStatus = warningsFor(emp.id).length > 0;
    }
    const matchesWarning = !warningOnly || warningsFor(emp.id).length > 0;
    return matchesSearch && matchesStatus && matchesWarning;
  });

  // stats (dihitung dari seluruh employees, bukan hasil filter)
  const totalKaryawan = employees.length;
  const insite = employees.filter(e=>e.status==='insite').length;
  const outsite = employees.filter(e=>e.status==='outsite').length;
  const overdue = employees.filter(e=>sisaJT(e) < 0).length;
  const nearJT = employees.filter(e=> sisaJT(e) >= 0 && sisaJT(e) <= 7).length;
  const withWarning = employees.filter(e=>warningsFor(e.id).length>0).length;

  document.getElementById('stats').innerHTML = `
    ${statCard('Total Karyawan', totalKaryawan, 'bg-blue-50 text-blue-700')}
    ${statCard('Sedang Insite', insite, 'bg-emerald-50 text-emerald-700')}
    ${statCard('Sedang Outsite', outsite, 'bg-sky-50 text-sky-700')}
    ${statCard('Overdue Roster', overdue, 'bg-red-50 text-red-700')}
    ${statCard('Cuti Akan Hangus', withWarning, 'bg-amber-50 text-amber-700')}
  `;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = list.map(emp=>{
    const elapsed = elapsedCycleDays(emp);
    const sisa = sisaJT(emp);
    const tah = saldoTahunan(emp.id);
    const ext = saldoExtra(emp.id);
    const warns = warningsFor(emp.id);
    let rowClass = '';
    if(emp.status==='outsite') rowClass = 'outsite';
    else if(sisa < 0) rowClass = 'overdue';
    else if(sisa <= 7) rowClass = 'near';

    return `
    <tr class="${rowClass} border-b">
      <td class="p-2 font-medium cursor-pointer hover:opacity-70" onclick="openHistoryModal('${emp.id}')">${emp.nama}</td>
      <td class="p-2">${emp.nik}</td>
      <td class="p-2">${emp.jabatan||'-'}</td>
      <td class="p-2">
        <span class="badge ${emp.status==='insite'?'bg-emerald-200 text-emerald-800':'bg-sky-200 text-sky-800'}">${emp.status}</span>
        ${emp.status==='outsite' ? `<button onclick="markKembaliInsite('${emp.id}')" class="ml-1 text-[11px] underline text-sky-700">tandai kembali</button>` : ''}
      </td>
      <td class="p-2">${elapsed} hari</td>
      <td class="p-2 font-semibold ${sisa<0?'text-red-600':sisa<=7?'text-amber-600':'text-slate-700'}">${sisa} hari</td>
      <td class="p-2">${tah} hari</td>
      <td class="p-2">${ext} hari</td>
      <td class="p-2">
        ${warns.length ? warns.map(w=>`<div class="badge bg-amber-200 text-amber-900 mb-1">${w}</div>`).join('') : '<span class="text-slate-400 text-xs">-</span>'}
      </td>
      <td class="p-2 whitespace-nowrap">
        <button onclick="openEventModal('${emp.id}')" class="text-xs bg-indigo-500 text-white px-2 py-1 rounded-lg mr-1">Catat</button>
        <button onclick="openHistoryModal('${emp.id}')" class="text-xs bg-slate-500 text-white px-2 py-1 rounded-lg">Riwayat</button>
      </td>
    </tr>`;
  }).join('');
}

function statCard(label, value, cls){
  return `<div class="rounded-xl shadow p-4 ${cls}">
    <div class="text-xs font-semibold opacity-70">${label}</div>
    <div class="text-3xl font-bold mt-1">${value}</div>
  </div>`;
}

// ============ MODAL HELPERS ============
function closeModal(id){ document.getElementById(id).classList.remove('flex'); document.getElementById(id).classList.add('hidden'); }
function openModal(id){ document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }

// ============ ADD EMPLOYEE ============
function openAddEmployeeModal(){
  ['inpNik','inpNama','inpJabatan','inpGolongan'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inpJoinDate').value = todayStr();
  document.getElementById('inpCycleStart').value = todayStr();
  openModal('modalAddEmployee');
}
async function saveEmployee(){
  const nik = document.getElementById('inpNik').value.trim();
  const nama = document.getElementById('inpNama').value.trim();
  const jabatan = document.getElementById('inpJabatan').value.trim();
  const golongan = document.getElementById('inpGolongan').value.trim();
  const joinDate = document.getElementById('inpJoinDate').value;
  const cycleStart = document.getElementById('inpCycleStart').value;
  if(!nik || !nama || !joinDate || !cycleStart){ alert('Lengkapi NIK, Nama, Tanggal Masuk, dan Mulai Siklus.'); return; }

  const {data, error} = await sb.from('employees').insert({
    nik, nama, jabatan, golongan, join_date: joinDate, cycle_start_date: cycleStart, status:'insite'
  }).select();
  if(error){ alert('Gagal simpan: ' + error.message); return; }
  employees.push(data[0]);
  await ensureAllAnnualLedgers();
  closeModal('modalAddEmployee');
  render();
}

async function markKembaliInsite(empId){
  const today = todayStr();
  const {error} = await sb.from('employees').update({status:'insite', cycle_start_date: today}).eq('id', empId);
  if(error){ alert('Gagal update: ' + error.message); return; }
  const emp = employees.find(e=>e.id===empId);
  emp.status = 'insite'; emp.cycle_start_date = today;
  render();
}

// ============ EVENT MODAL ============
function openEventModal(empId){
  currentEventEmployee = employees.find(e=>e.id===empId);
  document.getElementById('eventEmployeeName').innerText = currentEventEmployee.nama + ' — Hari kerja berjalan: ' + elapsedCycleDays(currentEventEmployee) + ' hari';
  document.getElementById('eventType').value = 'pulang_normal';
  renderEventFields();
  openModal('modalEvent');
}

function renderEventFields(){
  const type = document.getElementById('eventType').value;
  const container = document.getElementById('eventFields');
  const today = todayStr();
  if(type === 'pulang_normal'){
    const maxTah = saldoTahunan(currentEventEmployee.id);
    const maxExt = saldoExtra(currentEventEmployee.id);
    container.innerHTML = `
      <label class="text-xs text-slate-500">Tanggal Pulang</label>
      <input type="date" id="evDate" value="${today}" oninput="previewReturnDate()" class="border rounded-lg px-3 py-2 w-full text-sm mb-3">

      <div class="grid grid-cols-2 gap-3 mb-1">
        <div>
          <label class="text-xs text-slate-500">Hari Tahunan (maks ${maxTah})</label>
          <input type="number" min="0" max="${maxTah}" id="evTahunanUsed" value="0" oninput="previewReturnDate()" class="border rounded-lg px-3 py-2 w-full text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500">Hari Extra (maks ${maxExt})</label>
          <input type="number" min="0" max="${maxExt}" id="evExtraUsed" value="0" oninput="previewReturnDate()" class="border rounded-lg px-3 py-2 w-full text-sm">
        </div>
      </div>
      <p class="text-xs text-slate-500 mb-3">Saldo Tahunan saat ini: <b>${maxTah}</b> hari. Saldo Extra: <b>${maxExt}</b> hari. 14 hari Roster selalu ikut otomatis.</p>

      <div class="bg-slate-50 border rounded-lg p-3 text-sm">
        <div>Total hari cuti: <b id="evTotalDays">14</b> hari (14 Roster + <span id="evTahDisplay">0</span> Tahunan + <span id="evExtDisplay">0</span> Extra)</div>
        <div class="mt-1">Tanggal Kembali Kerja (perkiraan): <b class="text-emerald-700" id="evReturnDate">-</b></div>
        <div class="mt-2 border-t pt-2">Sisa Tahunan setelah ini: <b id="evSisaTahunan">${maxTah}</b> hari</div>
        <div id="evWarningTahunan"></div>
      </div>
    `;
    previewReturnDate();
  } else if(type === 'diundur'){
    container.innerHTML = `
      <label class="text-xs text-slate-500">Tanggal Transaksi</label>
      <input type="date" id="evDate" value="${today}" class="border rounded-lg px-3 py-2 w-full text-sm mb-3">
      <label class="text-xs text-slate-500">Jumlah Hari Diundur</label>
      <input type="number" min="1" id="evDaysPostponed" oninput="previewExtra()" class="border rounded-lg px-3 py-2 w-full text-sm mb-2">
      <p class="text-xs text-slate-500" id="extraPreview">Extra yang didapat: 0 hari</p>
    `;
  } else if(type === 'diuangkan'){
    container.innerHTML = `
      <label class="text-xs text-slate-500">Tanggal Transaksi</label>
      <input type="date" id="evDate" value="${today}" class="border rounded-lg px-3 py-2 w-full text-sm mb-3">
      <label class="text-xs text-slate-500">Lama Istirahat di Site (1-4 hari)</label>
      <select id="evRestDays" class="border rounded-lg px-3 py-2 w-full text-sm mb-2">
        <option value="1">1 hari</option>
        <option value="2">2 hari</option>
        <option value="3">3 hari</option>
        <option value="4">4 hari</option>
      </select>
      <p class="text-xs text-slate-500">Cuti roster (14 hari) dicairkan/diuangkan. Hitungan hari kerja akan reset setelah istirahat.</p>
    `;
  }
}

function previewReturnDate(){
  const evDate = document.getElementById('evDate')?.value;
  const tah = parseInt(document.getElementById('evTahunanUsed')?.value || '0') || 0;
  const ext = parseInt(document.getElementById('evExtraUsed')?.value || '0') || 0;
  const total = 14 + tah + ext;
  document.getElementById('evTotalDays').innerText = total;
  document.getElementById('evTahDisplay').innerText = tah;
  document.getElementById('evExtDisplay').innerText = ext;
  document.getElementById('evReturnDate').innerText = evDate ? fmtDate(addDays(evDate, total)) : '-';

  if(currentEventEmployee){
    const maxTah = saldoTahunan(currentEventEmployee.id);
    const sisaTahunan = maxTah - tah;
    const sisaEl = document.getElementById('evSisaTahunan');
    const warnEl = document.getElementById('evWarningTahunan');
    if(sisaEl) sisaEl.innerText = sisaTahunan;
    if(warnEl){
      warnEl.innerHTML = sisaTahunan <= 0
        ? `<div class="mt-2 badge bg-red-200 text-red-800">Saldo Tahunan akan habis (0 hari)</div>`
        : '';
    }
  }
}

function previewExtra(){
  const days = parseInt(document.getElementById('evDaysPostponed').value || '0');
  const extra = Math.floor(days/4);
  document.getElementById('extraPreview').innerText = `Extra yang didapat: ${extra} hari (sisa ${days - extra*4} hari tidak dihitung)`;
}

async function submitEvent(){
  const type = document.getElementById('eventType').value;
  const emp = currentEventEmployee;
  const evDate = document.getElementById('evDate').value;
  if(!evDate){ alert('Isi tanggal.'); return; }

  if(type === 'pulang_normal'){
    const tahunanUsed = parseInt(document.getElementById('evTahunanUsed').value || '0') || 0;
    const extraUsed = parseInt(document.getElementById('evExtraUsed').value || '0') || 0;

    if(tahunanUsed < 0 || extraUsed < 0){ alert('Jumlah hari tidak boleh negatif.'); return; }
    if(saldoTahunan(emp.id) < tahunanUsed){ alert('Saldo Tahunan tidak cukup.'); return; }
    if(saldoExtra(emp.id) < extraUsed){ alert('Saldo Extra tidak cukup.'); return; }

    if(tahunanUsed > 0) await deductLedger('annual', emp.id, tahunanUsed);
    if(extraUsed > 0) await deductLedger('extra', emp.id, extraUsed);

    const totalOff = 14 + tahunanUsed + extraUsed;
    const returnDate = addDays(evDate, totalOff);
    const combo = `14+${tahunanUsed}+${extraUsed}`;

    await sb.from('roster_events').insert({
      employee_id: emp.id, cycle_start_date: emp.cycle_start_date, event_type:'pulang_normal',
      event_date: evDate, annual_used: tahunanUsed, extra_used: extraUsed, combination: combo,
      notes: `Perkiraan kembali: ${returnDate}`
    });

    await sb.from('employees').update({status:'outsite'}).eq('id', emp.id);
    emp.status = 'outsite';

  } else if(type === 'diundur'){
    const days = parseInt(document.getElementById('evDaysPostponed').value || '0');
    if(days <= 0){ alert('Isi jumlah hari diundur.'); return; }
    const extraEarned = Math.floor(days/4);

    await sb.from('roster_events').insert({
      employee_id: emp.id, cycle_start_date: emp.cycle_start_date, event_type:'diundur',
      event_date: evDate, days_postponed: days, notes: `Extra didapat: ${extraEarned} hari`
    });

    if(extraEarned > 0){
      const {data, error} = await sb.from('extra_leave_ledger').insert({
        employee_id: emp.id, transaction_date: evDate, days_postponed: days,
        extra_earned: extraEarned, expiry_date: addMonths(evDate, 6), used:0, cashed:0
      }).select();
      if(error){ alert('Gagal simpan extra: '+error.message); return; }
      extraLedger.push(data[0]);
    }

  } else if(type === 'diuangkan'){
    const restDays = parseInt(document.getElementById('evRestDays').value);
    const newCycleStart = addDays(evDate, restDays);

    await sb.from('roster_events').insert({
      employee_id: emp.id, cycle_start_date: emp.cycle_start_date, event_type:'diuangkan',
      event_date: evDate, rest_days: restDays, notes:'Cuti roster diuangkan'
    });

    await sb.from('employees').update({cycle_start_date: newCycleStart}).eq('id', emp.id);
    emp.cycle_start_date = newCycleStart;
  }

  closeModal('modalEvent');
  render();
}

// Kembalikan saldo (kebalikan dari deductLedger) — kurangi 'used' mulai dari yang expiry paling jauh dulu
async function reverseDeductLedger(kind, empId, amount){
  const table = kind === 'annual' ? annualLedger : extraLedger;
  const rows = table.filter(r => r.employee_id === empId && r.used > 0)
    .sort((a,b)=> b.expiry_date.localeCompare(a.expiry_date));

  let left = amount;
  for(const row of rows){
    if(left <= 0) break;
    const take = Math.min(row.used, left);
    row.used = row.used - take;
    left -= take;
    const tableName = kind === 'annual' ? 'annual_leave_ledger' : 'extra_leave_ledger';
    await sb.from(tableName).update({used: row.used}).eq('id', row.id);
  }
}

async function deleteEvent(eventId, eventType){
  if(!confirm('Hapus kejadian ini? Saldo/siklus yang terpengaruh akan otomatis dikembalikan.')) return;
  const {data: evRows, error: evErr} = await sb.from('roster_events').select('*').eq('id', eventId);
  if(evErr || !evRows.length){ alert('Data kejadian tidak ditemukan.'); return; }
  const ev = evRows[0];
  const empId = ev.employee_id;
  const emp = employees.find(e=>e.id===empId);

  if(eventType === 'pulang_normal'){
    if(ev.annual_used > 0) await reverseDeductLedger('annual', empId, ev.annual_used);
    if(ev.extra_used > 0) await reverseDeductLedger('extra', empId, ev.extra_used);
    await sb.from('employees').update({status:'insite'}).eq('id', empId);
    if(emp) emp.status = 'insite';
  } else if(eventType === 'diundur'){
    const {data: extRows} = await sb.from('extra_leave_ledger')
      .select('*').eq('employee_id', empId).eq('transaction_date', ev.event_date).eq('days_postponed', ev.days_postponed);
    if(extRows && extRows.length){
      await sb.from('extra_leave_ledger').delete().eq('id', extRows[0].id);
      extraLedger = extraLedger.filter(r=>r.id !== extRows[0].id);
    }
  } else if(eventType === 'diuangkan'){
    await sb.from('employees').update({cycle_start_date: ev.cycle_start_date}).eq('id', empId);
    if(emp) emp.cycle_start_date = ev.cycle_start_date;
  }

  await sb.from('roster_events').delete().eq('id', eventId);
  render();
  renderHistoryContent();
}

// Kurangi saldo FIFO berdasarkan expiry_date paling dekat dulu
async function deductLedger(kind, empId, amount){
  const table = kind === 'annual' ? annualLedger : extraLedger;
  const rows = activeLedgerFor(table, empId)
    .filter(r => remaining(r, kind) > 0)
    .sort((a,b)=> a.expiry_date.localeCompare(b.expiry_date));

  let left = amount;
  for(const row of rows){
    if(left <= 0) break;
    const avail = remaining(row, kind);
    const take = Math.min(avail, left);
    row.used = row.used + take;
    left -= take;
    const tableName = kind === 'annual' ? 'annual_leave_ledger' : 'extra_leave_ledger';
    await sb.from(tableName).update({used: row.used}).eq('id', row.id);
  }
}

// ============ CASH OUT (DICAIRKAN) ============
async function cashOutLedger(kind, rowId){
  const table = kind === 'annual' ? annualLedger : extraLedger;
  const row = table.find(r=>r.id===rowId);
  const rem = remaining(row, kind);
  if(rem <= 0){ alert('Tidak ada saldo untuk dicairkan.'); return; }
  if(!confirm(`Cairkan ${rem} hari ${kind==='annual'?'Tahunan':'Extra'}?`)) return;
  row.cashed = row.cashed + rem;
  const tableName = kind === 'annual' ? 'annual_leave_ledger' : 'extra_leave_ledger';
  const {error} = await sb.from(tableName).update({cashed: row.cashed}).eq('id', rowId);
  if(error){ alert('Gagal: '+error.message); return; }
  render();
  openHistoryModal(currentHistEmployee.id);
}

async function batalkanCairkan(kind, rowId){
  if(!confirm('Batalkan pencairan ini? Saldo akan dikembalikan.')) return;
  const table = kind === 'annual' ? annualLedger : extraLedger;
  const row = table.find(r=>r.id===rowId);
  row.cashed = 0;
  const tableName = kind === 'annual' ? 'annual_leave_ledger' : 'extra_leave_ledger';
  const {error} = await sb.from(tableName).update({cashed: 0}).eq('id', rowId);
  if(error){ alert('Gagal: '+error.message); return; }
  render();
  openHistoryModal(currentHistEmployee.id);
}

// ============ HISTORY MODAL ============
function openHistoryModal(empId){
  currentHistEmployee = employees.find(e=>e.id===empId);
  document.getElementById('histEmployeeName').innerText = currentHistEmployee.nama + ' — ' + currentHistEmployee.nik;
  renderHistoryContent();
  openModal('modalHistory');
}

async function renderHistoryContent(){
  const empId = currentHistEmployee.id;
  const {data: events} = await sb.from('roster_events').select('*').eq('employee_id', empId).order('event_date', {ascending:false});

  const tah = annualLedger.filter(r=>r.employee_id===empId).sort((a,b)=>b.earned_date.localeCompare(a.earned_date));
  const ext = extraLedger.filter(r=>r.employee_id===empId).sort((a,b)=>b.transaction_date.localeCompare(a.transaction_date));

  let html = `<h3 class="font-semibold text-sm mt-2 mb-1">Saldo Tahunan</h3>`;
  html += `<table class="w-full text-xs mb-4"><thead><tr class="bg-slate-100"><th class="p-1 text-left">Didapat</th><th class="p-1 text-left">Expired</th><th class="p-1">Jumlah</th><th class="p-1">Terpakai</th><th class="p-1">Dicairkan</th><th class="p-1">Sisa</th><th class="p-1">Aksi</th></tr></thead><tbody>`;
  tah.forEach(r=>{
    const rem = remaining(r,'annual');
    html += `<tr class="border-b"><td class="p-1">${fmtDate(r.earned_date)}</td><td class="p-1">${fmtDate(r.expiry_date)}</td><td class="p-1 text-center">${r.amount}</td><td class="p-1 text-center">${r.used}</td><td class="p-1 text-center">${r.cashed}</td><td class="p-1 text-center font-semibold">${rem}</td>
    <td class="p-1 text-center">
      ${rem>0?`<button onclick="cashOutLedger('annual','${r.id}')" class="text-[11px] bg-amber-500 text-white px-2 py-0.5 rounded">Cairkan</button>`:''}
      ${r.cashed>0?`<button onclick="batalkanCairkan('annual','${r.id}')" class="text-[11px] bg-slate-400 text-white px-2 py-0.5 rounded ml-1">Batalkan</button>`:''}
      ${rem<=0 && r.cashed<=0?'-':''}
    </td></tr>`;
  });
  html += `</tbody></table>`;

  html += `<h3 class="font-semibold text-sm mb-1">Saldo Extra</h3>`;
  html += `<table class="w-full text-xs mb-4"><thead><tr class="bg-slate-100"><th class="p-1 text-left">Transaksi</th><th class="p-1 text-left">Expired</th><th class="p-1">Hari Diundur</th><th class="p-1">Extra</th><th class="p-1">Terpakai</th><th class="p-1">Dicairkan</th><th class="p-1">Sisa</th><th class="p-1">Aksi</th></tr></thead><tbody>`;
  ext.forEach(r=>{
    const rem = remaining(r,'extra');
    html += `<tr class="border-b"><td class="p-1">${fmtDate(r.transaction_date)}</td><td class="p-1">${fmtDate(r.expiry_date)}</td><td class="p-1 text-center">${r.days_postponed}</td><td class="p-1 text-center">${r.extra_earned}</td><td class="p-1 text-center">${r.used}</td><td class="p-1 text-center">${r.cashed}</td><td class="p-1 text-center font-semibold">${rem}</td>
    <td class="p-1 text-center">
      ${rem>0?`<button onclick="cashOutLedger('extra','${r.id}')" class="text-[11px] bg-amber-500 text-white px-2 py-0.5 rounded">Cairkan</button>`:''}
      ${r.cashed>0?`<button onclick="batalkanCairkan('extra','${r.id}')" class="text-[11px] bg-slate-400 text-white px-2 py-0.5 rounded ml-1">Batalkan</button>`:''}
      ${rem<=0 && r.cashed<=0?'-':''}
    </td></tr>`;
  });
  html += `</tbody></table>`;

  html += `<h3 class="font-semibold text-sm mb-1">Riwayat Kejadian Roster</h3>`;
  html += `<table class="w-full text-xs"><thead><tr class="bg-slate-100"><th class="p-1 text-left">Tanggal</th><th class="p-1 text-left">Jenis</th><th class="p-1 text-left">Detail</th><th class="p-1 text-left">Aksi</th></tr></thead><tbody>`;
  (events||[]).forEach(ev=>{
    let detail = '';
    if(ev.event_type==='pulang_normal') detail = `Kombinasi ${ev.combination} (Tahunan ${ev.annual_used}, Extra ${ev.extra_used})`;
    if(ev.event_type==='diundur') detail = `Diundur ${ev.days_postponed} hari`;
    if(ev.event_type==='diuangkan') detail = `Istirahat ${ev.rest_days} hari, siklus reset`;
    html += `<tr class="border-b"><td class="p-1">${fmtDate(ev.event_date)}</td><td class="p-1 capitalize">${ev.event_type.replace('_',' ')}</td><td class="p-1">${detail}</td>
    <td class="p-1"><button onclick="deleteEvent('${ev.id}','${ev.event_type}')" class="text-[11px] bg-red-500 text-white px-2 py-0.5 rounded">Hapus</button></td></tr>`;
  });
  html += `</tbody></table>`;
  html += `<p class="text-[11px] text-slate-400 mt-2">*Kalau salah input, hapus kejadiannya (saldo otomatis dikembalikan / siklus dikembalikan), lalu catat ulang lewat tombol "Catat" yang benar.</p>`;

  document.getElementById('histContent').innerHTML = html;
}

loadData();
</script>
